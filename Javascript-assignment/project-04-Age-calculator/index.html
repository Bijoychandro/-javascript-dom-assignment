<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎂 Age Calculator</h1>
            
            <div class="input-group">
                <label for="dobInput">Enter Your Date of Birth</label>
                <input type="date" id="dobInput" />
            </div>
            
            <button id="calculateBtn">Calculate Age</button>
            
            <div class="result" id="resultDisplay">
                <span class="result-label">Your Age</span>
                <span class="result-value" id="ageValue">—</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
