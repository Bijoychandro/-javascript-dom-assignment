<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⏱️ Stopwatch</h1>
            
            <div class="display">
                <span id="hours">00</span>
                <span class="separator">:</span>
                <span id="minutes">00</span>
                <span class="separator">:</span>
                <span id="seconds">00</span>
            </div>
            
            <div class="controls">
                <button id="startBtn" class="btn btn-start">▶ Start</button>
                <button id="stopBtn" class="btn btn-stop">⏹ Stop</button>
                <button id="resetBtn" class="btn btn-reset">⟳ Reset</button>
            </div>
            
            <div class="lap-section">
                <button id="lapBtn" class="btn btn-lap">⏱️ Lap</button>
                <div class="lap-list" id="lapList">
                    <div class="lap-empty">No laps recorded</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
