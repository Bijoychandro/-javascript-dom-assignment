<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 Number Guessing Game</h1>
            <p class="subtitle">Guess the number between 1 and 100</p>
            
            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">Attempts</span>
                    <span class="info-value" id="attempts">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Range</span>
                    <span class="info-value" id="rangeDisplay">1 - 100</span>
                </div>
            </div>
            
            <div class="feedback" id="feedback">
                <span class="feedback-icon">💡</span>
                <span class="feedback-text">Enter a number and click Guess!</span>
            </div>
            
            <div class="input-group">
                <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100" />
                <button id="guessBtn">Guess</button>
            </div>
            
            <div class="action-buttons">
                <button id="newGameBtn" class="btn-new-game">🔄 New Game</button>
                <button id="hintBtn" class="btn-hint">💡 Hint</button>
            </div>
            
            <div class="history" id="history">
                <div class="history-empty">Your guesses will appear here</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
