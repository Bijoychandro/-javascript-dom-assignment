<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Text Preview</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 Live Text Preview</h1>
            
            <div class="input-section">
                <label for="textInput">Type something...</label>
                <input type="text" id="textInput" placeholder="Start typing here..." />
                <span class="char-counter" id="charCounter">0 characters</span>
            </div>
            
            <div class="preview-section">
                <label>Preview</label>
                <div class="preview-box" id="previewBox">
                    <span class="preview-placeholder" id="placeholder">Type Something...</span>
                    <span class="preview-text" id="previewText"></span>
                </div>
            </div>
            
            <div class="preview-options">
                <label class="checkbox-label">
                    <input type="checkbox" id="uppercaseCheck" />
                    Uppercase
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="boldCheck" />
                    Bold
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="italicCheck" />
                    Italic
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="underlineCheck" />
                    Underline
                </label>
            </div>
            
            <div class="word-stats">
                <div class="stat-item">
                    <span class="stat-label">Characters</span>
                    <span class="stat-value" id="charCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Words</span>
                    <span class="stat-value" id="wordCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Lines</span>
                    <span class="stat-value" id="lineCount">0</span>
                </div>
            </div>
            
            <button id="clearBtn" class="clear-btn">🗑️ Clear</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
