<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📊 Student Result Calculator</h1>
            
            <div class="input-section">
                <div class="input-group">
                    <label for="bangla">Bangla</label>
                    <input type="number" id="bangla" placeholder="0-100" min="0" max="100" />
                </div>
                <div class="input-group">
                    <label for="english">English</label>
                    <input type="number" id="english" placeholder="0-100" min="0" max="100" />
                </div>
                <div class="input-group">
                    <label for="math">Math</label>
                    <input type="number" id="math" placeholder="0-100" min="0" max="100" />
                </div>
            </div>
            
            <button id="calculateBtn">Calculate Result</button>
            
            <div class="result-section" id="resultSection">
                <div class="result-item">
                    <span class="result-label">Total Marks</span>
                    <span class="result-value" id="totalMarks">—</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Average Marks</span>
                    <span class="result-value" id="averageMarks">—</span>
                </div>
                <div class="result-item grade-item">
                    <span class="result-label">Grade</span>
                    <span class="result-value grade-value" id="grade">—</span>
                </div>
            </div>
            
            <div class="grade-guide">
                <h3>Grade Guide</h3>
                <div class="grade-table">
                    <div class="grade-row"><span>80-100</span><span>A+</span></div>
                    <div class="grade-row"><span>70-79</span><span>A</span></div>
                    <div class="grade-row"><span>60-69</span><span>A-</span></div>
                    <div class="grade-row"><span>50-59</span><span>B</span></div>
                    <div class="grade-row"><span>40-49</span><span>C</span></div>
                    <div class="grade-row"><span>33-39</span><span>D</span></div>
                    <div class="grade-row"><span>0-32</span><span>F</span></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
