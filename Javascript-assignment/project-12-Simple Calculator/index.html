<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🧮 Simple Calculator</h1>
            
            <div class="input-section">
                <div class="input-group">
                    <label for="num1">Number 1</label>
                    <input type="number" id="num1" placeholder="Enter first number" step="any" />
                </div>
                <div class="input-group">
                    <label for="num2">Number 2</label>
                    <input type="number" id="num2" placeholder="Enter second number" step="any" />
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-add" id="addBtn">➕ Add</button>
                <button class="btn-subtract" id="subtractBtn">➖ Subtract</button>
                <button class="btn-multiply" id="multiplyBtn">✖️ Multiply</button>
                <button class="btn-divide" id="divideBtn">➗ Divide</button>
            </div>
            
            <div class="result-section" id="resultSection">
                <span class="result-label">Result</span>
                <span class="result-value" id="resultDisplay">—</span>
            </div>
            
            <div class="history-section">
                <div class="history-header">
                    <span>📜 History</span>
                    <button id="clearHistoryBtn" class="clear-history">Clear</button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-empty">No calculations yet</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
